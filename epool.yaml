# eRPC Pool Configuration - Auto-updated from GitHub
# Upload this file to: https://github.com/xservices-git/yamiya/blob/main/epool.yaml
# Scanner will download and update every 30 seconds

erpc_pool:
  # Health check interval (seconds)
  health_check_interval: 3
  
  # eRPC servers list
  servers:
    - name: local-erpc
      url: http://localhost:4000
    
    - name: vps-1-erpc
      url: http://142.54.189.250:4000
    
    - name: vps-2-erpc
      url: http://135.148.112.180:4000
  
  # Load balancing strategy
  # Options: "least-loaded" (recommended), "round-robin", "best"
  strategy: round-robin
