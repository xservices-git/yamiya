    rateLimitBudget: default-budget
    jsonRpc:
      supportsBatch: true
      batchMaxSize: 100
      batchMaxWait: 50ms
    failsafe:
      timeout:
        duration: 15s
      retry:
        maxAttempts: 2
        delay: 100ms
        backoffMaxDelay: 1s
        backoffFactor: 1.5
        jitter: 50ms
