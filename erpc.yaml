logLevel: warn
database:
  evmJsonRpcCache:
    connectors:
    - id: memory-cache
      driver: memory
      memory:
        maxItems: 200000
    policies:
    - network: '*'
      method: eth_getBalance|eth_call|eth_getTransactionCount|eth_getCode|eth_getStorageAt
      finality: finalized
      empty: allow
      connector: memory-cache
      ttl: '0'
    - network: '*'
      method: eth_getBalance|eth_call|eth_getBlockByNumber|eth_getLogs
      finality: unfinalized
      empty: allow
      connector: memory-cache
      ttl: 10s
    - network: '*'
      method: eth_blockNumber|eth_gasPrice|eth_maxPriorityFeePerGas
      finality: realtime
      empty: allow
      connector: memory-cache
      ttl: 2s
server:
  httpHostV4: 0.0.0.0
  httpPortV4: 4000
  maxTimeout: 120s
metrics:
  enabled: true
  hostV4: 0.0.0.0
  port: 4001
projects:
- id: main
  rateLimitBudget: global-budget
  upstreamDefaults:
