logLevel: warn
server:
  listenV4: true
  httpPort: 4000
  maxTimeout: 120s
  enableGzip: true
  readTimeout: 90s
  writeTimeout: 10m0s
  maxConnections: 100000
  enableCors: true
healthCheck:
  mode: networks
  defaultEval: any:initializedUpstreams
  interval: 20s
metrics:
  enabled: true
  listenV4: true
  hostV4: 0.0.0.0
  port: 4001
database:
  evmJsonRpcCache:
    connectors:
    - id: memory-cache
      driver: memory
      memory:
        maxItems: 200000
    policies:
    - network: '*'
      method: eth_getBalance|eth_call|eth_getTransactionCount
      finality: finalized
      ttl: '0'
      connector: memory-cache
    - network: '*'
      method: eth_getBalance|eth_call
      finality: unfinalized
      ttl: 10s
      connector: memory-cache
    - network: '*'
      method: eth_blockNumber|eth_gasPrice
      finality: realtime
      ttl: 2s
      connector: memory-cache
projects:
- id: wallet-scanner-max
  upstreamDefaults:
    type: evm
    jsonRpc:
      supportsBatch: true
      batchMaxSize: 100
      batchMaxWait: 50ms
    rateLimitBudget: default
    failsafe:
      timeout:
        duration: 15s
      retry:
        maxCount: 2
        delay: 100ms
        backoffMaxDelay: 1s
        backoffFactor: 1.5
        jitter: 50ms
      circuitBreaker:
        failureThresholdCount: 10
        failureThresholdCapacity: 50
        halfOpenAfter: 30s
        successThresholdCount: 5
        successThresholdCapacity: 10
  networkDefaults:
    architecture: evm
    failsafe:
      timeout:
        duration: 60s
      retry:
        maxCount: 5
        delay: 200ms
        backoffMaxDelay: 3s
        backoffFactor: 2.0
        jitter: 100ms
        emptyResultConfidence: blockHead
        emptyResultAccept:
        - eth_getLogs
        - eth_getTransactionReceipt
        emptyResultMaxAttempts: 3
      hedge:
        delay: 250ms
        maxCount: 10
      circuitBreaker:
        failureThresholdCount: 20
        failureThresholdCapacity: 100
        halfOpenAfter: 60s
        successThresholdCount: 10
        successThresholdCapacity: 20
  routing:
    scoreMultipliers:
      errorRate: 10.0
      p90Latency: 5.0
      totalRequests: 0.1
      throttledRate: 8.0
      blockHeadLag: 3.0
    scorePenaltyDecayRate: 0.9
    scoreSwitchHysteresis: 0.05
    scoreMinSwitchInterval: 30s
