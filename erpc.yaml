logLevel: error

server:
  listenV4: true
  httpPort: 4000
  maxTimeout: "30s"  # Giảm xuống 30s cho fail fast
  enableGzip: true
  readTimeout: "30s"  # Giảm xuống 30s
  writeTimeout: "30s"  # Giảm xuống 30s
  maxConnections: 10000  # OK - Tăng max connections
  
  # ⚡ QUAN TRỌNG NHẤT - Cho phép xử lý nhiều requests đồng thời!
  httpServer:
    maxConcurrentRequests: 5000  # ← KEY SETTING! Tăng từ default ~100-500
    http2: true  # Enable HTTP/2 multiplexing
    maxHeaderBytes: 1048576  # 1MB headers
    idleTimeout: "120s"  # Keep connections alive

healthCheck:
  mode: "networks"
  defaultEval: "any:initializedUpstreams"
  interval: "30s"  # Check health mỗi 10s

metrics:
  enabled: true
  listenV4: true
  hostV4: "0.0.0.0"
  port: 4001

projects:
  - id: main
    # Cache để giảm request trùng - TĂNG CACHE
    cache:
      ttl: "30s"  # 30s đủ cho balance checking
      cacheMethods:
        - "eth_getBalance"
        - "eth_call"
        - "eth_blockNumber"
        - "eth_getTransactionCount"
      cacheSize: 100000  # Tăng lên 100k entries
    
    # Failsafe thông minh - TỐI ƯU
    failsafe:
      timeout:
        duration: "10s"  # 10s cho fail fast
      retry:
        maxCount: 2  # Chỉ retry 2 lần (nhanh hơn)
        delay: "100ms"  # Delay ngắn
        backoffMaxDelay: "2s"  # Max delay ngắn
        backoffFactor: 2  # Backoff nhanh
        jitter: "50ms"  # Jitter nhỏ
      hedge:
        delay: "300ms"  # Hedge nhanh - gửi request dự phòng sau 300ms
        maxCount: 2  # Tối đa 2 hedge requests
      # Xử lý empty results
      emptyResultConfidence: "unknown"
      emptyResultAccept:
        - "eth_getBalance"
        - "eth_call"
        - "eth_getTransactionCount"
        - "eth_blockNumber"
      emptyResultDelay: "50ms"
    
    upstreams:
      # Ethereum (25+ endpoints)
      - endpoint: https://eth.llamarpc.com
      - endpoint: https://ethereum.publicnode.com
      - endpoint: https://eth.drpc.org
      - endpoint: https://1rpc.io/eth
      - endpoint: https://rpc.ankr.com/eth
      - endpoint: https://cloudflare-eth.com
      - endpoint: https://rpc.flashbots.net
      - endpoint: https://eth-mainnet-public.unifra.io
      - endpoint: https://ethereum.blockpi.network/v1/rpc/public
      - endpoint: https://rpc.payload.de
      - endpoint: https://eth.rpc.blxrbdn.com
      - endpoint: https://nodes.mewapi.io/rpc/eth
      - endpoint: https://ethereumnodelight.app.runonflux.io
      - endpoint: https://api.mycryptoapi.com/eth
      - endpoint: https://gateway.tenderly.co/public/mainnet
      - endpoint: https://eth.meowrpc.com
      - endpoint: https://rpc.builder0x69.io
      - endpoint: https://api.securerpc.com/v1
      - endpoint: https://eth-mainnet.g.alchemy.com/v2/demo
      - endpoint: https://mainnet.infura.io/v3/9aa3d95b3bc440fa88ea12eaa4456161
      - endpoint: https://endpoints.omniatech.io/v1/eth/mainnet/public
      - endpoint: https://eth.api.onfinality.io/public
      - endpoint: https://mainnet.gateway.tenderly.co
      - endpoint: https://core.gashawk.io/rpc
      - endpoint: https://rpc.eth.gateway.fm
      
      # BSC (18+ endpoints)
      - endpoint: https://bsc-dataseed.binance.org/
      - endpoint: https://bsc-dataseed1.binance.org/
      - endpoint: https://bsc-dataseed2.binance.org/
      - endpoint: https://bsc-dataseed3.binance.org/
      - endpoint: https://bsc-dataseed4.binance.org/
      - endpoint: https://bsc-dataseed1.defibit.io/
      - endpoint: https://bsc-dataseed2.defibit.io/
      - endpoint: https://bsc-dataseed1.ninicoin.io/
      - endpoint: https://bsc-dataseed2.ninicoin.io/
      - endpoint: https://bsc.drpc.org
      - endpoint: https://1rpc.io/bnb
      - endpoint: https://binance.nodereal.io
      - endpoint: https://bsc.publicnode.com
      - endpoint: https://rpc.ankr.com/bsc
      - endpoint: https://bsc.meowrpc.com
      - endpoint: https://endpoints.omniatech.io/v1/bsc/mainnet/public
      - endpoint: https://bsc.api.onfinality.io/public
      - endpoint: https://bsc-mainnet.gateway.pokt.network/v1/lb/6136201a7bad1500343e248d
      - endpoint: https://bsc.rpc.blxrbdn.com
      
      

    # Network-specific failsafe
    networks:
      - architecture: evm
        chainId: 1
        failsafe:
          emptyResultConfidence: "finalized"
          emptyResultAccept:
            - "eth_getBalance"
            - "eth_call"
      - architecture: evm
        chainId: 56
        failsafe:
          emptyResultConfidence: "finalized"
          emptyResultAccept:
            - "eth_getBalance"
            - "eth_call"
      - architecture: evm
        chainId: 137
        failsafe:
          emptyResultConfidence: "finalized"
          emptyResultAccept:
            - "eth_getBalance"
            - "eth_call"

rateLimiters:
  budgets:
    - id: default
      rules:
        - method: "*"
          maxCount: 20000  # 20k/s - Rất cao!
          period: 1s
    - id: high_priority
      rules:
        - method: "eth_getBalance"
          maxCount: 30000  # 30k/s cho balance checks
          period: 1s
        - method: "eth_call"
          maxCount: 30000  # 30k/s cho token checks
          period: 1s
        - method: "eth_blockNumber"
          maxCount: 50000  # 50k/s cho block number (rất nhẹ)
          period: 1s